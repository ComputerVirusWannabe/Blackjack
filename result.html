<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack Result</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header>
    <h1>Blackjack Royale</h1>
  </header>

  <main class="result-container">
    <h2>Game Over!</h2>
    <p>You Win! 🎉</p>
    <div class="summary">
      <p>Player Hand: &#x1F0D3; &#x1F0A0;</p> <!-- From unicode on Wikipedia: 3 of Diamonds, Back of card -->
      <p>Dealer Hand: &#x1F0A1; &#x1F0A0;</p> <!-- Ace of Spades, Back of card -->

    </div>
    <button onclick="window.location.href='index.html'">Play Again</button>
  </main>

  <footer>
    <p>&copy; 2025 Blackjack Game</p>
  </footer>
</body>
</html>
