<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack Game</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header>
    <h1>Blackjack</h1>
  </header>

  <main class="game-container">
    <section class="dealer-hand">
      <h2>Dealer</h2>
      <div class="cards">
        <div class="card">NOTHING YET</div>
        <div class="card">TEST</div>
      </div>
    </section>

    <section class="player-hand">
      <h2>Player</h2>
      <div class="cards">
        <div class="card">NOTHINGYET</div>
        <div class="card">TESTING</div>
      </div>
      <p>Total: 12</p>
      <div class="controls">
        <button>Hit</button>
        <button>Stand</button>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Blackjack Game</p>
  </footer>
</body>
</html>
